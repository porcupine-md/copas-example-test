services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: copas_demo
      POSTGRES_USER: copas
      POSTGRES_PASSWORD: copas
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copas -d copas_demo"]
      interval: 5s
      timeout: 5s
      retries: 10
