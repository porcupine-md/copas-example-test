<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello, World! · Copas deploy test</title>
    <style>
      :root { color-scheme: light; font-family: ui-rounded, "Avenir Next", "Trebuchet MS", sans-serif; background: #fff8f2; color: #26140b; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 1.5rem; }
      main { width: min(42rem, 100%); border: 2px solid #26140b; padding: clamp(2rem, 8vw, 5rem); box-shadow: 10px 10px 0 #ff6b35; background: #fffdf9; }
      .eyebrow { margin: 0 0 3rem; color: #c83d14; font-size: .75rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
      h1 { max-width: 9ch; margin: 0; font-size: clamp(3.2rem, 12vw, 6.5rem); line-height: .86; letter-spacing: -.07em; }
      p { max-width: 34rem; margin: 2rem 0 0; font-size: clamp(1rem, 2vw, 1.2rem); line-height: 1.55; }
      code { padding: .2em .45em; background: #ffe2d2; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Copas deployment check / 01</p>
      <h1>Hello,<br />World!</h1>
      <p>This static HTML page is ready to deploy. No build command, no dependencies—just <code>index.html</code>.</p>
    </main>
  </body>
</html>
